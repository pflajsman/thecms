name: Example Website CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'examples/**'
      - '.github/workflows/example-website-ci-cd.yml'

jobs:
  deploy:
    name: Build & Deploy to Static Web App
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build blog
        run: pnpm --filter blog-flajsman build

      - name: Generate config.js from secrets
        run: |
          cat > examples/dist/config.js <<EOF
          window.__CMS_CONFIG__ = {
            apiUrl: "${{ secrets.EXAMPLE_CMS_API_URL }}",
            apiKey: "${{ secrets.EXAMPLE_CMS_API_KEY }}",
            siteTitle: "${{ secrets.EXAMPLE_CMS_SITE_TITLE }}",
            postsSlug: "${{ secrets.EXAMPLE_CMS_POSTS_SLUG }}",
            pagesSlug: "${{ secrets.EXAMPLE_CMS_PAGES_SLUG }}",
            contactFormSlug: "${{ secrets.EXAMPLE_CMS_CONTACT_FORM_SLUG }}",
          };
          EOF

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_EXAMPLE_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: examples/dist
          output_location: ''
          skip_app_build: true
